interface:
  display_name: "Engineering Orchestrator"
  short_description: "Split, route, and review code work"
  default_prompt: "Use $engineering-orchestrator to turn this request into ranked architecture options, multi-agent work slices, acceptance evidence, and optional external subtasks. Keep GPT-5.4 on the Codex main thread as the core developer and source of truth. Use `claude`, `codex`, and `opencode` for code-related or verification-related subtasks, and use `openclaw` for project-external execution subtasks such as consultation gathering or media publishing. Prefer project-local `tmp/codex-tasks` callbacks for delegated Ollama subtasks, require the delegated lane to write a non-empty callback file and verify it before exit, treat terminal summaries as advisory only, and only write final user-facing test archives to docs/reports."
